name: AI Company Radar

on:
  workflow_dispatch:
  schedule:
    # 00:30 Australia/Sydney during AEST (UTC+10).
    # Adjust this when daylight saving changes if you care about exact wall-clock time.
    - cron: "30 14 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ai-company-radar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run company radar
        run: python company_radar.py

      - name: Commit company radar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add company/*.md
          if git diff --cached --quiet; then
            echo "No company radar changes to commit."
            exit 0
          fi
          git commit -m "Add AI company radar digest"
          git pull --rebase --autostash origin main
          git push origin main

