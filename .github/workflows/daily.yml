name: AI Agent Radar

on:
  workflow_dispatch:
  schedule:
    # 00:00 Australia/Sydney during AEST (UTC+10).
    # Adjust this when daylight saving changes if you care about exact wall-clock time.
    - cron: "0 14 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar
        run: python radar.py

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inbox/*.md state.json
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
            exit 0
          fi
          git commit -m "Add daily AI agent radar digest"
          git pull --rebase --autostash origin main
          git push origin main
