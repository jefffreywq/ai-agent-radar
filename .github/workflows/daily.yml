name: AI Agent Radar

on:
  workflow_dispatch:
  schedule:
    # 00:00 Australia/Sydney during AEST (UTC+10).
    # Adjust this when daylight saving changes if you care about exact wall-clock time.
    - cron: "0 14 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar
        run: python radar.py

      - name: Sync latest branch before commit
        run: git pull --rebase origin main

      - name: Commit digest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add daily AI agent radar digest"
          file_pattern: "inbox/*.md state.json"
