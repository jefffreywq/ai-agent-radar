name: Agent Weekly Trend Radar

on:
  workflow_dispatch:
  schedule:
    # Sunday 00:15 Australia/Sydney during AEST (UTC+10).
    # Adjust this when daylight saving changes if you care about exact wall-clock time.
    - cron: "15 14 * * 6"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: agent-weekly-trends-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly trend radar
        run: python weekly_trends.py

      - name: Commit weekly trend radar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weekly/*.md state/trending_terms.json
          if git diff --cached --quiet; then
            echo "No weekly trend changes to commit."
            exit 0
          fi
          git commit -m "Add weekly agent trend radar"
          git pull --rebase --autostash origin main
          git push origin main

