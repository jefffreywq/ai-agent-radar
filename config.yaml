  sources:
    global:
      # 全部优先使用RSS源（最可靠、最准确）
      - name: OpenAI News
        type: rss
        url: https://openai.com/news/rss
      - name: Anthropic News
        type: rss
        url: https://www.anthropic.com/news/rss
      - name: Google DeepMind Blog
        type: rss
        url: https://blog.google/technology/google-deepmind/rss
      - name: Microsoft AI Blog
        type: rss
        url: https://www.microsoft.com/en-us/ai/blog/rss
      - name: Meta AI Blog
        type: rss
        url: https://ai.meta.com/blog/rss
      - name: Mistral News
        type: rss
        url: https://mistral.ai/news/rss
      - name: GitHub AI Blog
        type: rss
        url: https://github.blog/ai-and-ml/rss
      - name: Cursor Changelog
        type: rss
        url: https://www.cursor.com/changelog/rss
    china:
      # 中国公司优先使用RSS源，没有的保留page类型
      - name: DeepSeek Docs
        type: page
        url: https://api-docs.deepseek.com/
      - name: Qwen Blog
        type: rss
        url: https://qwenlm.github.io/blog/feed.xml
      - name: Moonshot AI
        type: page
        url: https://www.moonshot.cn/
      - name: Zhipu AI
        type: page
        url: https://www.zhipuai.cn/
      - name: Baidu AI Cloud
        type: page
        url: https://cloud.baidu.com/
      - name: Tencent Hunyuan
        type: page
        url: https://hunyuan.tencent.com/
      - name: ByteDance Seed
        type: page
        url: https://seed.bytedance.com/
      - name: MiniMax
        type: page
        url: https://www.minimax.io/
      - name: Manus
        type: page
        url: https://manus.im/

ai:
  enabled: true
  provider: deepseek
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  max_tokens_daily: 3500
  max_tokens_weekly: 6000
  max_tokens_company: 2200
  max_items: 15
  max_summary_chars_per_item: 1200
  language: zh-CN

search:
  hf_space_queries:
    - agent leaderboard
    - multi-agent benchmark
    - web agent
    - agent challenge
    - coding agent benchmark
    - computer use agent
    - tool use agent
    - SWE-bench agent
    - GAIA benchmark
    - WebArena agent

ranking:
